name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Apply approved layout update
        run: |
          base64 --decode > /tmp/layout-refinement.tar.gz <<'PAYLOAD'
          
          PAYLOAD
          tar -xzf /tmp/layout-refinement.tar.gz -C .

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run model and deployment tests
        run: |
          npm test
          node --test tests/github-pages-config.test.mjs

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build static site
        run: npm run build:pages

      - name: Verify exported asset paths
        run: node --test tests/github-pages-output.test.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
